# beam01.lab — lightweight hecate-stub instances (alongside existing daemons)

services:
  stub-vilnius:
    image: ghcr.io/hecate-social/hecate-stub:main
    container_name: stub-vilnius
    restart: always
    network_mode: host
    environment:
      MACULA_RELAYS: https://relay01.macula.io:4433
      HECATE_MESH_REALM: io.macula
      HECATE_NODE_NAME: stub-vilnius@beam01.lab
      HECATE_ERLANG_COOKIE: ZMFTAHTHAYKXRVMPPQIZ
      HECATE_GEO_CITY: Vilnius
      HECATE_GEO_COUNTRY: LT
      HECATE_GEO_LAT: "54.69"
      HECATE_GEO_LNG: "25.28"
      HECATE_OWNER_NAME: Macula Demo
      HECATE_SITE_NAME: beam01.lab
      HEALTH_PORT: "9001"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

