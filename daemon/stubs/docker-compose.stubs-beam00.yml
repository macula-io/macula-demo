# beam00.lab — lightweight hecate-stub instances (alongside existing daemons)

services:
  stub-dublin:
    image: ghcr.io/hecate-social/hecate-stub:main
    container_name: stub-dublin
    restart: always
    network_mode: host
    environment:
      MACULA_RELAYS: https://relay03.macula.io:4433
      HECATE_MESH_REALM: io.macula
      HECATE_NODE_NAME: stub-dublin@beam00.lab
      HECATE_ERLANG_COOKIE: ZMFTAHTHAYKXRVMPPQIZ
      HECATE_GEO_CITY: Dublin
      HECATE_GEO_COUNTRY: IE
      HECATE_GEO_LAT: "53.35"
      HECATE_GEO_LNG: "-6.26"
      HECATE_OWNER_NAME: Macula Demo
      HECATE_SITE_NAME: beam00.lab
      HEALTH_PORT: "9001"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

