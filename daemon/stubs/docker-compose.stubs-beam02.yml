# beam02.lab — 100 Belgian household/business stubs via JSON config

services:
  hecate-stubs:
    image: ghcr.io/hecate-social/hecate-stub:main
    container_name: hecate-stubs
    restart: always
    network_mode: host
    environment:
      HECATE_MESH_REALM: io.macula
      HECATE_NODE_NAME: stubs@beam02.lab
      HECATE_ERLANG_COOKIE: ZMFTAHTHAYKXRVMPPQIZ
      HECATE_STUB_CONFIG: /config/stubs.json
      HEALTH_PORT: "9010"
      MACULA_RELAYS: https://relay-be-brussels.macula.io:4433
    volumes:
      - ./stubs-beam02.json:/config/stubs.json:ro
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
