# Co-located relays — multiple relay instances on one host.
#
# Used on the Linode box (macula.io) alongside relay02 which runs in
# the realm compose. Each relay gets a unique QUIC port and hostname.
#
# Uses the wildcard *.macula.io cert from the realm Caddy volume.
# Fake geo locations make them appear worldwide on the topology map.
#
# Usage:
#   docker compose -f docker-compose.colocated.yml up -d
#
# Prerequisites:
#   - Realm compose running (provides caddy_data volume with wildcard cert)
#   - DNS A records for relay04-06.macula.io pointing to this host

x-relay-common: &relay-common
  image: ghcr.io/macula-io/macula-relay:${RELAY_VERSION:-main}
  user: "0"
  restart: unless-stopped
  labels:
    - "com.centurylinklabs.watchtower.enable=true"
  volumes:
    - macula-realm-compose_caddy_data:/certs:ro
  networks:
    - macula-realm-compose_macula-internal

x-relay-env: &relay-env
  MACULA_REALM: io.macula
  MACULA_TLS_MODE: production
  MACULA_TLS_CERTFILE: /certs/caddy/certificates/acme-v02.api.letsencrypt.org-directory/wildcard_.macula.io/wildcard_.macula.io.crt
  MACULA_TLS_KEYFILE: /certs/caddy/certificates/acme-v02.api.letsencrypt.org-directory/wildcard_.macula.io/wildcard_.macula.io.key
  RELAY_ENABLED: "true"
  MACULA_MODE: relay
  MACULA_RELAYS: >-
    https://relay00.macula.io:4433,
    https://relay01.macula.io:4433,
    https://relay02.macula.io:4433,
    https://relay03.macula.io:4433,
    https://relay04.macula.io:4434,
    https://relay05.macula.io:4435,
    https://relay06.macula.io:4436

services:
  relay04:
    <<: *relay-common
    container_name: macula-relay04
    environment:
      <<: *relay-env
      MACULA_HOSTNAME: relay04.macula.io
      MACULA_QUIC_PORT: "4434"
      MACULA_HEALTH_PORT: "9094"
      NODE_NAME: macula-relay04
      # Tokyo, Japan
      MACULA_GEO_CITY: Tokyo
      MACULA_GEO_COUNTRY: JP
      MACULA_GEO_LAT: "35.6762"
      MACULA_GEO_LNG: "139.6503"
      MACULA_PROVIDER: Linode
    ports:
      - "4434:4434/udp"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9094/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  relay05:
    <<: *relay-common
    container_name: macula-relay05
    environment:
      <<: *relay-env
      MACULA_HOSTNAME: relay05.macula.io
      MACULA_QUIC_PORT: "4435"
      MACULA_HEALTH_PORT: "9095"
      NODE_NAME: macula-relay05
      # Sao Paulo, Brazil
      MACULA_GEO_CITY: "Sao Paulo"
      MACULA_GEO_COUNTRY: BR
      MACULA_GEO_LAT: "-23.5505"
      MACULA_GEO_LNG: "-46.6333"
      MACULA_PROVIDER: Linode
    ports:
      - "4435:4435/udp"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9095/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  relay06:
    <<: *relay-common
    container_name: macula-relay06
    environment:
      <<: *relay-env
      MACULA_HOSTNAME: relay06.macula.io
      MACULA_QUIC_PORT: "4436"
      MACULA_HEALTH_PORT: "9096"
      NODE_NAME: macula-relay06
      # Sydney, Australia
      MACULA_GEO_CITY: Sydney
      MACULA_GEO_COUNTRY: AU
      MACULA_GEO_LAT: "-33.8688"
      MACULA_GEO_LNG: "151.2093"
      MACULA_PROVIDER: Linode
    ports:
      - "4436:4436/udp"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9096/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  macula-realm-compose_macula-internal:
    external: true

volumes:
  macula-realm-compose_caddy_data:
    external: true
