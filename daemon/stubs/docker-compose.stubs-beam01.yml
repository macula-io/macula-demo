# beam01.lab — ONE multi-tenant hecate-stub container with N virtual node identities

services:
  hecate-stubs:
    image: ghcr.io/hecate-social/hecate-stub:main
    container_name: hecate-stubs
    restart: always
    network_mode: host
    environment:
      HECATE_MESH_REALM: io.macula
      HECATE_NODE_NAME: stubs@beam01.lab
      HECATE_ERLANG_COOKIE: ZMFTAHTHAYKXRVMPPQIZ
      HECATE_OWNER_NAME: Macula Demo
      HECATE_SITE_NAME: beam01.lab
      HEALTH_PORT: "9010"
      MACULA_RELAYS: https://relay-fi-helsinki.macula.io:4433
      HECATE_STUB_IDENTITIES: >-
        stub-vilnius@beam01.lab:Vilnius:LT:54.69:25.28:https://relay-lt-vilnius.macula.io:4433,
        stub-gdansk@beam01.lab:Gdansk:PL:54.35:18.65:https://relay-pl-gdansk.macula.io:4433,
        stub-krakow@beam01.lab:Krakow:PL:50.06:19.94:https://relay-pl-krakow.macula.io:4433,
        stub-budapest@beam01.lab:Budapest:HU:47.50:19.04:https://relay-hu-budapest.macula.io:4433,
        stub-bratislava@beam01.lab:Bratislava:SK:48.15:17.11:https://relay-sk-bratislava.macula.io:4433,
        stub-tampere@beam01.lab:Tampere:FI:61.50:23.79:https://relay-fi-helsinki.macula.io:4433,
        stub-turku@beam01.lab:Turku:FI:60.45:22.27:https://relay-fi-helsinki.macula.io:4433,
        stub-malmo@beam01.lab:Malmo:SE:55.60:13.00:https://relay-se-stockholm.macula.io:4433,
        stub-linkoping@beam01.lab:Linkoping:SE:58.41:15.62:https://relay-se-stockholm.macula.io:4433,
        stub-tartu@beam01.lab:Tartu:EE:58.38:26.72:https://relay-ee-tallinn.macula.io:4433
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
