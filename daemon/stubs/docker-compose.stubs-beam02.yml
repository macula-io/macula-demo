# beam02.lab — lightweight hecate-stub instances (alongside existing daemons)

services:
  stub-marseille:
    image: ghcr.io/hecate-social/hecate-stub:main
    container_name: stub-marseille
    restart: always
    network_mode: host
    environment:
      MACULA_RELAYS: https://relay02.macula.io:4433
      HECATE_MESH_REALM: io.macula
      HECATE_NODE_NAME: stub-marseille@beam02.lab
      HECATE_ERLANG_COOKIE: ZMFTAHTHAYKXRVMPPQIZ
      HECATE_GEO_CITY: Marseille
      HECATE_GEO_COUNTRY: FR
      HECATE_GEO_LAT: "43.30"
      HECATE_GEO_LNG: "5.37"
      HECATE_OWNER_NAME: Macula Demo
      HECATE_SITE_NAME: beam02.lab
      HEALTH_PORT: "9001"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

