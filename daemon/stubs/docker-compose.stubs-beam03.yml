# beam03.lab — European stubs via JSON config

services:
  hecate-stubs:
    image: ghcr.io/hecate-social/hecate-stub:main
    container_name: hecate-stubs
    restart: always
    network_mode: host
    environment:
      HECATE_MESH_REALM: io.macula
      HECATE_NODE_NAME: stubs@beam03.lab
      HECATE_ERLANG_COOKIE: ZMFTAHTHAYKXRVMPPQIZ
      HECATE_STUB_CONFIG: /config/stubs.json
      HEALTH_PORT: "9010"
      STUB_ADMIN_PORT: "9011"
      MACULA_ADMIN_TOKEN: ${MACULA_ADMIN_TOKEN:-}
      MACULA_RELAYS: https://box-hetzner-nuremberg.macula.io:4433,https://box-hetzner-helsinki.macula.io:4433
    volumes:
      - ./stubs-beam03.json:/config/stubs.json:ro
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
