# beam00.lab — ONE multi-tenant hecate-stub container with N virtual node identities
# Format: name:city:country:lat:lng:relay_url

services:
  hecate-stubs:
    image: ghcr.io/hecate-social/hecate-stub:main
    container_name: hecate-stubs
    restart: always
    network_mode: host
    environment:
      HECATE_MESH_REALM: io.macula
      HECATE_NODE_NAME: stubs@beam00.lab
      HECATE_ERLANG_COOKIE: ZMFTAHTHAYKXRVMPPQIZ
      HECATE_OWNER_NAME: Macula Demo
      HECATE_SITE_NAME: beam00.lab
      HEALTH_PORT: "9010"
      MACULA_RELAYS: https://relay-de-nuremberg.macula.io:4433
      HECATE_STUB_IDENTITIES: >-
        stub-dublin@beam00.lab:Dublin:IE:53.35:-6.26:https://relay-ie-dublin.macula.io:4433,
        stub-edinburgh@beam00.lab:Edinburgh:UK:55.95:-3.19:https://relay-uk-edinburgh.macula.io:4433,
        stub-frankfurt@beam00.lab:Frankfurt:DE:50.11:8.68:https://relay-de-frankfurt.macula.io:4433,
        stub-stuttgart@beam00.lab:Stuttgart:DE:48.78:9.18:https://relay-de-nuremberg.macula.io:4433,
        stub-cologne@beam00.lab:Cologne:DE:50.94:6.96:https://relay-de-cologne.macula.io:4433,
        stub-hannover@beam00.lab:Hannover:DE:52.37:9.74:https://relay-de-nuremberg.macula.io:4433,
        stub-dortmund@beam00.lab:Dortmund:DE:51.51:7.47:https://relay-de-nuremberg.macula.io:4433,
        stub-dresden@beam00.lab:Dresden:DE:51.05:13.74:https://relay-de-nuremberg.macula.io:4433,
        stub-antwerp@beam00.lab:Antwerp:BE:51.22:4.40:https://relay-be-antwerp.macula.io:4433,
        stub-ghent@beam00.lab:Ghent:BE:51.05:3.72:https://relay-be-brussels.macula.io:4433
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
