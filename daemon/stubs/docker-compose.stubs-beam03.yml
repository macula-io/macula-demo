# beam03.lab — lightweight hecate-stub instances (alongside existing daemons)

services:
  stub-ghent:
    image: ghcr.io/hecate-social/hecate-stub:main
    container_name: stub-ghent
    restart: always
    network_mode: host
    environment:
      MACULA_RELAYS: https://relay03.macula.io:4433
      HECATE_MESH_REALM: io.macula
      HECATE_NODE_NAME: stub-ghent@beam03.lab
      HECATE_ERLANG_COOKIE: ZMFTAHTHAYKXRVMPPQIZ
      HECATE_GEO_CITY: Ghent
      HECATE_GEO_COUNTRY: BE
      HECATE_GEO_LAT: "51.05"
      HECATE_GEO_LNG: "3.72"
      HECATE_OWNER_NAME: Macula Demo
      HECATE_SITE_NAME: beam03.lab
      HEALTH_PORT: "9001"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

